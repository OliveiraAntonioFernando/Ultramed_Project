# 1. Definição do motor Ultramed (Django)
upstream web_app {
    server web:8000;
}

# 2. Redirecionamento Global HTTP -> HTTPS (com exceção para renovação Let's Encrypt)
server {
    listen 80;
    server_name ultramedsaudexingu.com.br rinancode.com.br;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2b. Italian Pizzaria — HTTP (ACME + redirect para HTTPS)
server {
    listen 80;
    server_name italianpizzaria.com.br www.italianpizzaria.com.br;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 3. BLOCO EXCLUSIVO: RINAN TEAM (SaaS Global)
server {
    listen 443 ssl;
    server_name rinancode.com.br;

    # Padronizado para o volume /etc/letsencrypt que mapeamos no compose
    ssl_certificate /etc/letsencrypt/live/rinancode.com.br/fullchain.pem; 
    ssl_certificate_key /etc/letsencrypt/live/rinancode.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # RinanBot: landing verde (rinan-api) + app/login/API (porta 9100).
    location = /rinanbot {
        return 301 /rinanbot/;
    }

    location /rinanbot/api/ {
        proxy_pass http://host.docker.internal:9100/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /rinanbot/static/ {
        rewrite ^/rinanbot/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:9100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ ^/rinanbot/(login|app|reset)(/.*)?$ {
        rewrite ^/rinanbot/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:9100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /rinanbot/ {
        proxy_pass http://host.docker.internal:9000/rinanbot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # RinanFood: KDS + API + webhooks (porta 9200, stack isolado).
    location = /rinanfood {
        return 301 /rinanfood/;
    }

    location /rinanfood/ {
        rewrite ^/rinanfood/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:9200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # RinanDocs: GED corporativo (porta 9400, stack isolado).
    location = /rinandocs {
        return 301 /rinandocs/;
    }

    location /rinandocs/ {
        rewrite ^/rinandocs/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:9400;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        client_max_body_size 30M;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        # CORREÇÃO: Usa o host.docker.internal para sair do container e achar o Rinan na porta 9000
        proxy_pass http://host.docker.internal:9000; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}

