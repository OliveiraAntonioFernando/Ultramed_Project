# 5. BLOCO EXCLUSIVO: ULTRAMED (Django)
server {
    listen 443 ssl;
    server_name ultramedsaudexingu.com.br;

    # Padronizado para o caminho interno do container que mapeia o letsencrypt
    ssl_certificate /etc/letsencrypt/live/ultramedsaudexingu.com.br/fullchain.pem; 
    ssl_certificate_key /etc/letsencrypt/live/ultramedsaudexingu.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location /static/ {
        alias /usr/share/nginx/html/static/;
    }

    location /media/ {
        return 403;
    }

    location / {
        proxy_pass http://web_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}